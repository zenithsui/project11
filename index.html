<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/media/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/media/favicon.svg" />
    <link rel="shortcut icon" href="/media/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/media/apple-touch-icon.png" />
    <link rel="manifest" href="/media/site.webmanifest" />
    <meta name="language" content="English" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/media/og-image.webp" />
    <meta property="og:description" content="AmitProject11 — a digital comfort space." />
    <title>AmitProject11</title>
  </head>
  <body>

    <!-- ── Preloader ── -->
    <div class="preloader" id="preloader">
      <div class="preloader__card">

        <!-- sticker fan -->
        <div class="preloader__stickers" id="preloader-stickers">
          <div class="sticker sticker--1">
            <div class="sticker__inner">
              <svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="28" fill="#c8e84a" stroke="#9ab830" stroke-width="2"/><circle cx="22" cy="26" r="6" fill="#222"/><circle cx="24" cy="24" r="2" fill="#fff"/><path d="M18 38 Q30 46 42 38" stroke="#222" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg>
            </div>
          </div>
          <div class="sticker sticker--2">
            <div class="sticker__inner">
              <svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="28" fill="#1e3a8a"/><text x="30" y="36" text-anchor="middle" fill="#f59e0b" font-size="18" font-weight="bold" font-family="sans-serif">★</text><circle cx="30" cy="30" r="27" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="4 3"/></svg>
            </div>
          </div>
          <div class="sticker sticker--3">
            <div class="sticker__inner">
              <svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="28" fill="#f97316"/><line x1="44.0" y1="30.0" x2="56.0" y2="30.0" stroke="#7c2d02" stroke-width="3"/><line x1="42.1" y1="37.0" x2="52.5" y2="43.0" stroke="#7c2d02" stroke-width="3"/><line x1="37.0" y1="42.1" x2="43.0" y2="52.5" stroke="#7c2d02" stroke-width="3"/><line x1="30.0" y1="44.0" x2="30.0" y2="56.0" stroke="#7c2d02" stroke-width="3"/><line x1="23.0" y1="42.1" x2="17.0" y2="52.5" stroke="#7c2d02" stroke-width="3"/><line x1="17.9" y1="37.0" x2="7.5" y2="43.0" stroke="#7c2d02" stroke-width="3"/><line x1="16.0" y1="30.0" x2="4.0" y2="30.0" stroke="#7c2d02" stroke-width="3"/><line x1="17.9" y1="23.0" x2="7.5" y2="17.0" stroke="#7c2d02" stroke-width="3"/><line x1="23.0" y1="17.9" x2="17.0" y2="7.5" stroke="#7c2d02" stroke-width="3"/><line x1="30.0" y1="16.0" x2="30.0" y2="4.0" stroke="#7c2d02" stroke-width="3"/><line x1="37.0" y1="17.9" x2="43.0" y2="7.5" stroke="#7c2d02" stroke-width="3"/><line x1="42.1" y1="23.0" x2="52.5" y2="17.0" stroke="#7c2d02" stroke-width="3"/><circle cx="30" cy="30" r="13" fill="#fed7aa"/><text x="30" y="35" text-anchor="middle" fill="#7c2d02" font-size="11" font-weight="bold" font-family="sans-serif">MALONE</text></svg>
            </div>
          </div>
          <div class="sticker sticker--4">
            <div class="sticker__inner">
              <svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="28" fill="#991b1b"/><circle cx="30" cy="30" r="18" fill="none" stroke="#fca5a5" stroke-width="2"/><text x="30" y="34" text-anchor="middle" fill="#fecaca" font-size="9" font-weight="bold" font-family="sans-serif" letter-spacing="1">SKULL</text></svg>
            </div>
          </div>
          <div class="sticker sticker--5">
            <div class="sticker__inner">
              <svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="28" fill="#ec4899"/><circle cx="22" cy="25" r="5" fill="#222"/><circle cx="38" cy="25" r="5" fill="#222"/><circle cx="24" cy="23" r="2" fill="#fff"/><circle cx="40" cy="23" r="2" fill="#fff"/><path d="M18 38 Q30 48 42 38" stroke="#222" stroke-width="3" stroke-linecap="round" fill="none"/><circle cx="43" cy="22" r="5" fill="#a855f7" stroke="#fff" stroke-width="1.5"/><path d="M41 22 l4 0 M43 20 l0 4" stroke="#fff" stroke-width="1.5"/></svg>
            </div>
          </div>
          <div class="sticker sticker--6">
            <div class="sticker__inner" style="background:none">
              <svg viewBox="0 0 70 70" fill="none"><circle cx="35" cy="14" r="13" fill="#7c3aed"/><circle cx="14" cy="35" r="13" fill="#7c3aed"/><circle cx="56" cy="35" r="13" fill="#7c3aed"/><circle cx="35" cy="56" r="13" fill="#7c3aed"/><circle cx="35" cy="35" r="12" fill="#7c3aed"/></svg>
            </div>
          </div>
        </div>

        <!-- progress bar (hidden, still used by JS) -->
        <div class="preloader__progress-wrapper" style="display:none">
          <div class="preloader__progress-bar"></div>
        </div>

        <!-- percent counter -->
        <span class="preloader__percent">0%</span>

        <!-- bottom-right badge -->
        <div class="preloader__badge">
          <svg viewBox="0 0 44 32" fill="none"><rect x="1" y="1" width="26" height="22" rx="2" fill="#aaa"/><rect x="7" y="7" width="26" height="22" rx="2" fill="#888"/><circle cx="34" cy="16" r="8" fill="#888"/><circle cx="34" cy="16" r="5" fill="#aaa"/></svg>
        </div>

        <!-- shown after loading complete -->
        <div class="preloader__intro">
          <p class="preloader__description">Website is made by AMIT</p>
          <div class="preloader__dock" id="preloader-dock">
            <button id="enter-btn" class="dock-item">
              <div class="dock-icon-wrap">
                <svg viewBox="0 0 24 24" fill="currentColor" class="dock-svg">
                  <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                  <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
              </div>
              <span class="dock-tooltip">Enter with Sound</span>
            </button>
            <button id="enter-silent-btn" class="dock-item">
              <div class="dock-icon-wrap">
                <svg viewBox="0 0 24 24" fill="currentColor" class="dock-svg">
                  <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                </svg>
              </div>
              <span class="dock-tooltip">Enter without Sound</span>
            </button>
          </div>
        </div>

      </div>
    </div>
    <!-- ── /Preloader ── -->

    <div id="experience-wrapper">
      <canvas id="experience-canvas"></canvas>
    </div>

    <button id="back-btn" class="back-btn">&#8592; Back</button>

    <div class="top-right-controls">
      <button id="day-night-toggle" class="day-night-btn" data-mode="day">
        <span class="day-night-btn__icon">&#9790;</span>
      </button>
      <button id="info-btn" class="info-btn">i</button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
